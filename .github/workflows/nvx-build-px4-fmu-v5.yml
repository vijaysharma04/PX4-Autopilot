name: NVX Build PX4 FMUv5 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout PX4 source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install PX4 build dependencies
        run: bash ./Tools/setup/ubuntu.sh --no-sim-tools

      - name: Install missing PX4 Python build dependency
        run: python3 -m pip install --user symforce==0.9.0

      - name: Build px4_fmu-v5_default
        run: source ~/.profile && make px4_fmu-v5_default

      - name: Verify firmware artifact
        run: test -f build/px4_fmu-v5_default/px4_fmu-v5_default.px4

      - name: Upload px4 firmware
        uses: actions/upload-artifact@v4
        with:
          name: px4_fmu-v5_default-v1.15.4
          path: build/px4_fmu-v5_default/px4_fmu-v5_default.px4
